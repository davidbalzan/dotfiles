# Prefix: Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on

# Session management
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind K confirm-before -p "Kill session? (y/n)" kill-session
bind s choose-tree -sZ
bind w choose-tree -wZ
bind d detach-client
bind ( switch-client -p
bind ) switch-client -n
bind L switch-client -l

# Window management
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind & kill-window
bind r command-prompt -p "Rename window:" "rename-window '%%'"
bind R command-prompt -p "Rename session:" "rename-session '%%'"

# Splits (keep basics available)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind C-r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Status bar styling (Catppuccin Mocha) ---
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e] "

# Right: pwd, date/time
set -g status-right-length 80
set -g status-right "#[fg=#a6e3a1]#{pane_current_path} #[fg=#585b70]│ #[fg=#cba6f7]%a %d %b #[fg=#585b70]│ #[fg=#89b4fa,bold]%H:%M "

# Windows
set -g window-status-format "#[fg=#585b70]  #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold]  #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Messages
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Selection
set -g mode-style "bg=#45475a,fg=#cdd6f4"

# Source wallpaper-generated colors (overrides hardcoded colors above)
source-file -q ~/.config/tmux/colors-generated.conf
