# hyprlock.conf — wallpaper-driven lock screen
# Colors are sourced from a matugen-generated file; run matugen to regenerate.

source = ~/.config/hypr/hyprlock-colors.conf

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
    no_fade_out         = false
    ignore_empty_input  = false
}

# ── Background ───────────────────────────────────────────────────────────────

background {
    monitor  =
    # hyprlock does not expand $HOME; use the literal path.
    path     = /home/david/.cache/hypr-theme/last-wallpaper

    blur_passes  = 2
    blur_size    = 6
    noise        = 0.02
    contrast     = 0.9
    brightness   = 0.8
    vibrancy     = 0.2
    vibrancy_darkness = 0.2
}

# ── Clock ────────────────────────────────────────────────────────────────────

label {
    monitor  =
    text     = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color    = $lock_fg
    font_size   = 96
    font_family = JetBrains Mono Bold

    position = 0, 180
    halign   = center
    valign   = center

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(00000088)
    shadow_boost  = 1.2
}

# ── Date ─────────────────────────────────────────────────────────────────────

label {
    monitor  =
    text     = cmd[update:60000] echo "$(date +"%A, %B %-d")"
    color    = $lock_dim
    font_size   = 22
    font_family = JetBrains Mono

    position = 0, 80
    halign   = center
    valign   = center

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(00000066)
}

# ── Greeting ─────────────────────────────────────────────────────────────────

label {
    monitor  =
    text     = Hi David
    color    = $lock_dim
    font_size   = 16
    font_family = JetBrains Mono

    position = 0, -40
    halign   = center
    valign   = center

    shadow_passes = 1
    shadow_size   = 2
    shadow_color  = rgba(00000055)
}

# ── Password input field ─────────────────────────────────────────────────────

input-field {
    monitor  =
    size     = 320, 52
    outline_thickness = 2
    dots_size         = 0.28
    dots_spacing      = 0.18
    dots_center       = true
    dots_rounding     = -1

    outer_color    = $lock_accent_alpha
    inner_color    = $lock_bg_alpha
    font_color     = $lock_fg
    fade_on_empty  = true
    fade_timeout   = 1000

    placeholder_text = <i>Password</i>
    hide_input       = false

    check_color  = $lock_accent
    fail_color   = $lock_error
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000
    fail_transition = 300

    rounding = 8
    capslock_color = -1
    numlock_color  = -1
    bothlock_color = -1

    position = 0, -130
    halign   = center
    valign   = center
}

# ── Keyboard layout indicator (optional) ─────────────────────────────────────

label {
    monitor  =
    text     = $LAYOUT
    color    = $lock_dim
    font_size   = 13
    font_family = JetBrains Mono

    position = 0, -195
    halign   = center
    valign   = center
}
