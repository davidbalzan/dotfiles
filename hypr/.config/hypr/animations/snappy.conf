# Animation preset: snappy
animations {
    enabled = yes

    bezier = snappy, 0.2, 1, 0.3, 1
    bezier = snapOut, 0.3, 1, 0.2, 1

    animation = windows, 1, 2, snappy, popin 90%
    animation = windowsOut, 1, 2, snapOut, popin 90%
    animation = border, 1, 5, default
    animation = fade, 1, 2, snappy
    animation = workspaces, 1, 2, snappy, slide
}
