# Animation preset: minimal
animations {
    enabled = yes

    bezier = linear, 0, 0, 1, 1

    animation = windows, 1, 1, linear, popin 95%
    animation = windowsOut, 1, 1, linear, popin 95%
    animation = border, 1, 3, default
    animation = fade, 1, 2, linear
    animation = workspaces, 1, 2, linear, slide
}
