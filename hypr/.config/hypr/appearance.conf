# Programs
$terminal = alacritty
$fileManager = thunar
$menu = wofi --show drun

# General appearance
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    # Border colors are set by colors.conf (generated by matugen)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 0.92
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 25
        render_power = 2
        color = rgba(00000034)
    }

    blur {
        enabled = true
        size = 2
        passes = 6
        new_optimizations = true
        noise = 0.0117
        contrast = 0.97
        brightness = 1.0
        vibrancy = 0.2
        xray = false
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
