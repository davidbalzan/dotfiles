# --- Window opacity rules (tiered by app category) ---

# Browsers: 90% active, 85% inactive
windowrule = opacity 0.90 override 0.85 override, match:class ^(google-chrome-stable|Google-chrome|firefox|chromium|brave-browser|vivaldi)$

# Terminals & editors: 85% active, 78% inactive
windowrule = opacity 0.85 override 0.78 override, match:class ^(Alacritty|kitty|foot|code-oss|Code|codium)$

# Media & chat: 80% active, 75% inactive
windowrule = opacity 0.80 override 0.75 override, match:class ^(Spotify|spotify|steam|Steam|discord|telegram-desktop|org.telegram.desktop)$

# File managers: 88% active, 82% inactive
windowrule = opacity 0.88 override 0.82 override, match:class ^(thunar|Thunar|org.gnome.Nautilus|nemo|pcmanfm)$

# --- Idle inhibit (prevent screen off when fullscreen) ---
windowrule = idle_inhibit fullscreen, match:class ^(google-chrome-stable|Google-chrome|firefox|chromium|brave-browser)$
windowrule = idle_inhibit fullscreen, match:class ^(mpv|vlc|celluloid|io.github.celluloid_player.Celluloid)$
windowrule = idle_inhibit focus, match:class ^(Spotify|spotify)$

# --- Picture-in-Picture ---
windowrule {
    name = pip-rules
    match:title = ^(Picture-in-Picture|Picture in picture)$
    float = on
    pin = on
    size = (monitor_w*0.25) (monitor_h*0.25)
    move = (monitor_w*0.73) (monitor_h*0.72)
}

# --- Suppress maximize ---
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# --- Layer rules (blur on overlays) ---
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace wofi
layerrule = blur on, match:namespace mako
layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.3, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace wofi
layerrule = ignore_alpha 0.3, match:namespace mako
